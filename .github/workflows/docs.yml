name: 项目检查

on:
  push:
  pull_request:

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: 检查初始化文档
        run: python scripts/check_docs_bootstrap.py
      - name: 安装 Python 测试依赖
        run: python -m pip install pytest
      - name: 运行脚手架测试
        run: pytest tests/ -q
      - name: 构建 Godot CSharp 工程
        run: dotnet build godot/GetTheBestGodot/GetTheBestGodot.csproj --configuration Debug
